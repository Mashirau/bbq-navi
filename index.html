    const CAT_MAP = { "牛肉":"beef", "黒毛和牛":"wagyu", "宮崎牛":"miyazaki", "豚肉":"pork", "鶏肉":"chicken" };

    function parseCSV(text) {
      const lines = text.trim().split("\n");
      const products = [];
      for (let i = 1; i < lines.length; i++) {
        const cols = [];
        let cur = "", inQ = false;
        for (let ci = 0; ci < lines[i].length; ci++) {
          const ch = lines[i][ci];
          if (ch === '"') { inQ = !inQ; }
          else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ""; }
          else { cur += ch; }
        }
        cols.push(cur.trim());
        if (cols.length < 7 || !cols[0]) continue;
        products.push({
          id:         Number(cols[0]),
          category:   CAT_MAP[cols[1]] || cols[1],
          name:       cols[2].replace(/^"|"$/g,''),
          pricePerHg: Number(cols[3]),
          bbqRating:  Number(cols[4]),
          note:       cols[5].replace(/^"|"$/g,''),
          packGrams:  Number(cols[6]) || 200,
          jumboGrams: cols[7] && cols[7] !== '' ? Number(cols[7]) : null,
        });
      }
      return products.length > 0 ? products : null;
    }

    function loadProductsFromCSV() {
      return fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSOImEW5Hb_FVjlsoCB4l6BEV0e0uCkaxSUiLF-CvQ7zF9NIdZgAwjAT_yzvxu0d-tbejMCfn07eF9Y/pub?gid=0&single=true&output=csv")
        .then(function(res) { return res.text(); })
        .then(function(text) { return parseCSV(text); })
        .catch(function(e) { console.error("CSV読み込みエラー:", e); return null; });
    }

          });
        }

      } catch(e) {
        console.warn('スプレッドシート読み込み失敗、初期データを使用:', e);
        return null;
      }

function calcPacks(item, grams) {
  const packG  = item.packGrams  || 200;
  const jumboG = item.jumboGrams || null;
  if (jumboG && grams >= jumboG) {
    const jumbos  = Math.floor(grams / jumboG);
    const normals = Math.ceil((grams - jumbos * jumboG) / packG);
    const actualGrams = jumbos * jumboG + normals * packG;
    return { jumbos, normals, packG, jumboG, actualGrams };
  }
  const normals = Math.ceil(grams / packG);
  return { jumbos:0, normals, packG, jumboG, actualGrams: normals * packG };
}
function selectProducts(products, category, budgetYen, neededGrams, styleDef) {
  const minPrice = styleDef?.priceFilter || 0;
  let candidates = products
    .filter(p => p.category === category)
    .sort((a,b) => b.bbqRating - a.bbqRating);
  // 贅沢モードは高価格帯を優先（ただし候補が少なければ全体から選ぶ）
  if (minPrice > 0) {
    const premium = candidates.filter(p => p.pricePerHg >= minPrice);
    if (premium.length >= 2) candidates = premium;
  }
  if (!candidates.length) return [];
  const numPick = Math.min(candidates.length, styleDef?.picks?.[category] ?? (category === "beef" ? 3 : 2));
  const picked  = candidates.slice(0, numPick);
  let items = picked.map((p, i) => {
    const share = i === 0 ? 0.5 : 0.5 / (picked.length - 1);
    const neededG = Math.max(100, Math.round(neededGrams * share / 100) * 100);
    const packs   = calcPacks(p, neededG);
    const grams   = packs.actualGrams; // パック単位に合わせた実グラム数
    const cost    = Math.round(grams * p.pricePerHg / 100);
    return { ...p, grams, cost, packs };
  });
  if (items.reduce((s,x) => s+x.cost, 0) > budgetYen) {
    const cheap = [...picked].sort((a,b) => a.pricePerHg - b.pricePerHg)[0];
    const neededG2 = Math.max(100, Math.floor(budgetYen / cheap.pricePerHg * 100 / 100) * 100);
    const packs2  = calcPacks(cheap, neededG2);
    const grams2  = packs2.actualGrams;
    const cost2   = Math.round(grams2 * cheap.pricePerHg / 100);
    items = [{ ...cheap, grams:grams2, cost:cost2, packs:packs2 }];
  }
  return items.filter(x => x.grams > 0);
}

  const [csvStatus,   setCsvStatus]  = useState("loading"); // loading | ok | error

  useEffect(() => {
    loadProductsFromCSV().then(data => {
      if (data) { setProducts(data); setCsvStatus("ok"); }
      else { setCsvStatus("error"); }
    });
  }, []);

  return (
    <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#1a0a00,#2d1200,#1a0a00)", fontFamily:"'Hiragino Kaku Gothic Pro','Noto Sans JP','Meiryo',sans-serif", color:"#f5e6d0" }}>
      <div style={{ background:"linear-gradient(90deg,#8B0000,#c0392b,#8B0000)", padding:"16px 24px", borderBottom:"3px solid #ff6b35", boxShadow:"0 4px 20px rgba(255,107,53,.3)" }}>
        <div style={{ maxWidth:640, margin:"0 auto", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div>
            <div style={{ fontSize:20, fontWeight:"bold", letterSpacing:2, color:"#fff" }}>🥩 BBQ 買い出しナビ</div>
            <div style={{ fontSize:11, color:"#ffb89a", marginTop:2 }}>人数と予算を入れるだけで最適な肉を自動チョイス</div>
          </div>
          <div style={{ display:"flex", gap:8 }}>
            {[["calc","🧮 計算"], ["style","📋 スタイル"], ["edit","⚙️ 商品"]].map(([key, label]) => (
              <button key={key} onClick={() => setPage(key)} style={{
                padding:"8px 14px", borderRadius:20, cursor:"pointer", fontSize:12, fontWeight:"bold",
                border: page===key?"2px solid #ff6b35":"1px solid rgba(255,255,255,.3)",
                background: page===key?"rgba(255,107,53,.4)":"rgba(255,255,255,.08)",
                color: page===key?"#fff":"#ffb89a",
              }}>{label}</button>
            ))}
          </div>
        </div>
      </div>
      {sheetError && (
        <div style={{ background:"rgba(255,150,0,.2)", borderBottom:"1px solid rgba(255,150,0,.4)", padding:"8px 16px", fontSize:11, color:"#ffb89a", textAlign:"center" }}>
          ⚠️ スプレッドシートの読み込みに失敗しました。初期データを表示しています。
        </div>
      )}
      {page === "calc" ? <CalcPage products={products} styleItems={styleItems} /> : page === "style" ? <StyleEditPage products={products} styleItems={styleItems} setStyleItems={setStyleItems} /> : <EditPage products={products} setProducts={setProducts} />}
    </div>
  );
}

// ── 計算ページ ──────────────────────────────────────────────
function CalcPage({ products, styleItems }) {
  const [adultLarge,  setAdultLarge]  = useState(5);
  const [adultNormal, setAdultNormal] = useState(10);
  const [adultDrink,  setAdultDrink]  = useState(0);
  const [childUp,     setChildUp]     = useState(0);
  const [childLow,    setChildLow]    = useState(5);
  const [toddler,     setToddler]     = useState(0);
  const [budget,      setBudget]      = useState(30000);
  const [styleKey,    setStyleKey]    = useState("standard");
  const [customRatio, setCustomRatio] = useState({ beef:30, wagyu:15, miyazaki:15, pork:30, chicken:10 });
  const [customPicks, setCustomPicks] = useState({ beef:2, wagyu:2, miyazaki:2, pork:3, chicken:2 });


  const [perPerson,   setPerPerson]   = useState(1500);
  const [result,      setResult]      = useState(null);
  const [requestIds,  setRequestIds]  = useState(new Set());
  const [reqOpen,     setReqOpen]     = useState(false);
  const [reqFilter,   setReqFilter]   = useState("all");

  const totalPeople = adultLarge + adultNormal + adultDrink + childUp + childLow + toddler;

  const toggleRequest = (id) => {
    setRequestIds(prev => {
      const next = new Set(prev);
      next.has(id) ? next.delete(id) : next.add(id);
      return next;
    });
    setResult(null); // 変更したら結果リセット
  };

  const calculate = () => {
    const rawGrams  = adultLarge*PORTIONS.adult_large + adultNormal*PORTIONS.adult_normal + adultDrink*PORTIONS.adult_drink + childUp*PORTIONS.child_upper + childLow*PORTIONS.child_lower + toddler*PORTIONS.toddler;
    const adjGrams  = Math.round(rawGrams / 100) * 100;
    // useRatio: 各カテゴリの割合（0〜100の整数）
    const useRatio = styleKey === "custom"
      ? customRatio
      : { beef:RATIO.beef*100, wagyu:RATIO.wagyu*100, miyazaki:RATIO.miyazaki*100, pork:RATIO.pork*100, chicken:RATIO.chicken*100 };
    const usePicks = styleKey === "custom" ? customPicks : STYLES[styleKey].picks;
    const catGrams  = {};
    const catBudget = {};
    CATEGORIES.forEach(c => {
      catGrams[c]  = Math.round(adjGrams * (useRatio[c]||0) / 100) * 100;
      catBudget[c] = Math.round(budget   * (useRatio[c]||0) / 100);
    });

    const fixedIds = styleItems?.[styleKey] || [];
    const isFixed  = fixedIds.length > 0;

    const selections = {};
    let autoCost = 0;
    for (const cat of CATEGORIES) {
      if (isFixed) {
        // 固定モード：選択された商品をパック数算出して表示
        const fixedForCat = products.filter(p => fixedIds.includes(p.id) && p.category === cat);
        selections[cat] = fixedForCat.map(p => {
          const packs = calcPacks(p, p.packGrams || 200);
          const g = packs.actualGrams;
          return { ...p, grams: g, cost: Math.round(g * p.pricePerHg / 100), packs };
        });
      } else {
        const styleDef = { ...STYLES[styleKey], picks: usePicks };
        selections[cat] = selectProducts(products, cat, catBudget[cat], catGrams[cat], styleDef);
      }
      autoCost += selections[cat].reduce((s,x) => s+x.cost, 0);
    }
    const autoGrams = Object.values(selections).flat().reduce((s,x) => s+x.grams, 0);

    // リクエスト商品（通常パック1つ分で計算）
    const requestedItems = products
      .filter(p => requestIds.has(p.id))
      .map(p => {
        const packs = calcPacks(p, p.packGrams || 200);
        const g = packs.actualGrams;
        return { ...p, grams:g, cost:Math.round(g * p.pricePerHg / 100), packs };
      });
    const reqCost = requestedItems.reduce((s,x) => s+x.cost, 0);

    setResult({ totalPeople, adjGrams, selections, autoCost, autoGrams, requestedItems, reqCost, budgetOver:(autoCost+reqCost)>budget });
  };

  const reqFiltered = reqFilter === "all" ? products : products.filter(p => p.category === reqFilter);
  const reqCount    = requestIds.size;

  return (
    <div style={{ maxWidth:640, margin:"0 auto", padding:"24px 16px" }}>

      {/* 人数・予算入力カード */}
      <Card>
        <SecTitle>🎯 BBQのスタイル</SecTitle>
        <div style={{ display:"flex", flexDirection:"column", gap:8, marginBottom:20 }}>
          {Object.entries(STYLES).map(([key, s]) => (
            <div key={key} onClick={() => { setStyleKey(key); setResult(null); }} style={{
              padding:"12px 14px", borderRadius:12, cursor:"pointer",
              border: styleKey===key ? "2px solid #ff6b35" : "1px solid rgba(255,255,255,.12)",
              background: styleKey===key ? "rgba(255,107,53,.15)" : "rgba(255,255,255,.03)",
              transition:"all .15s",
            }}>
              <div style={{ fontSize:14, fontWeight:"bold", color: styleKey===key ? "#fff" : "#ccc" }}>{s.label}</div>
              <div style={{ fontSize:11, color:"#888", marginTop:3 }}>{s.desc}</div>
            </div>
          ))}
        </div>

        {/* カスタム比率・種類数パネル */}
        {styleKey === "custom" && (
          <div style={{ background:"rgba(255,255,255,.04)", border:"1px solid rgba(255,107,53,.3)", borderRadius:12, padding:16, marginBottom:20 }}>
            <div style={{ fontSize:13, color:"#ff6b35", fontWeight:"bold", marginBottom:4 }}>⚙️ カスタム設定</div>
            <div style={{ fontSize:11, color:"#888", marginBottom:14 }}>比率の合計が100%になるよう設定してください</div>
            {/* ヘッダー */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 60px 80px", gap:8, marginBottom:8 }}>
              <span style={{ fontSize:10, color:"#666" }}>カテゴリ</span>
              <span style={{ fontSize:10, color:"#666", textAlign:"center" }}>比率(%)</span>
              <span style={{ fontSize:10, color:"#666", textAlign:"center" }}>種類数</span>
            </div>
            {CATEGORIES.map(cat => (
              <div key={cat} style={{ display:"grid", gridTemplateColumns:"1fr 60px 80px", gap:8, alignItems:"center", marginBottom:10 }}>
                <span style={{ fontSize:13, color:"#ffb89a" }}>{CATEGORY_LABELS[cat]}</span>
                {/* 比率入力 */}
                <input type="number" min={0} max={100} value={customRatio[cat]}
                  onChange={e => { setCustomRatio(r => ({ ...r, [cat]:Math.max(0,Math.min(100,Number(e.target.value))) })); setResult(null); }}
                  style={{ width:"100%", background:"rgba(255,255,255,.1)", border:"1px solid rgba(255,107,53,.4)", borderRadius:6, color:"#fff", fontSize:14, padding:"6px 8px", textAlign:"center", fontFamily:"monospace", boxSizing:"border-box" }} />
                {/* 種類数 */}
                <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:4 }}>
                  <button onClick={() => { setCustomPicks(p => ({ ...p, [cat]:Math.max(0,(p[cat]||1)-1) })); setResult(null); }}
                    style={{ width:22, height:22, borderRadius:"50%", border:"1px solid rgba(255,107,53,.4)", background:"rgba(255,107,53,.15)", color:"#ff6b35", fontSize:13, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", padding:0 }}>−</button>
                  <span style={{ fontSize:14, fontWeight:"bold", color:"#fff", minWidth:18, textAlign:"center" }}>{customPicks[cat]||1}</span>
                  <button onClick={() => { setCustomPicks(p => ({ ...p, [cat]:(p[cat]||1)+1 })); setResult(null); }}
                    style={{ width:22, height:22, borderRadius:"50%", border:"1px solid rgba(255,107,53,.4)", background:"rgba(255,107,53,.15)", color:"#ff6b35", fontSize:13, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", padding:0 }}>＋</button>
                </div>
              </div>
            ))}
            {/* 合計表示 */}
            {(() => {
              const total = CATEGORIES.reduce((s,c) => s + (customRatio[c]||0), 0);
              return (
                <div style={{ marginTop:8, padding:"8px 12px", borderRadius:8, background: total===100 ? "rgba(0,200,0,.1)" : "rgba(255,0,0,.1)", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <span style={{ fontSize:12, color:"#aaa" }}>合計</span>
                  <span style={{ fontSize:15, fontWeight:"bold", color: total===100 ? "#7fff7f" : "#ff9999" }}>
                    {total}% {total===100 ? "✓ OK" : total > 100 ? "▲ 超過" : "▼ 不足"}
                  </span>
                </div>
              );
            })()}
          </div>
        )}

        <SecTitle>👥 参加人数</SecTitle>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:6, marginBottom:16 }}>
          {[
            { label:"たくさん召し上がる方", value:adultLarge,  set:setAdultLarge,  emoji:"🍖", p:PORTIONS.adult_large },
            { label:"大人の標準",           value:adultNormal, set:setAdultNormal, emoji:"🧑", p:PORTIONS.adult_normal },
            { label:"女性・お酒を飲む方",   value:adultDrink,  set:setAdultDrink,  emoji:"🍺", p:PORTIONS.adult_drink },
            { label:"小学生（高学年）",     value:childUp,     set:setChildUp,     emoji:"🧒", p:PORTIONS.child_upper },
            { label:"小学生（低学年）",     value:childLow,    set:setChildLow,    emoji:"👦", p:PORTIONS.child_lower },
            { label:"幼稚園児以下",         value:toddler,     set:setToddler,     emoji:"👶", p:PORTIONS.toddler },
          ].map(({ label, value, set, emoji, p }) => (
            <div key={label} style={{ display:"flex", flexDirection:"column", alignItems:"center", background:"rgba(255,255,255,.05)", borderRadius:10, padding:"8px 4px", gap:4 }}>
              <div style={{ fontSize:10, color:"#ffb89a", textAlign:"center", lineHeight:1.3 }}>{emoji}</div>
              <div style={{ fontSize:10, color:"#ffb89a", textAlign:"center", lineHeight:1.3, wordBreak:"keep-all" }}>{label}</div>
              <div style={{ fontSize:9, color:"#666" }}>{p}g/人</div>
              <div style={{ display:"flex", alignItems:"center", gap:4, marginTop:2 }}>
                <button onClick={() => { set(Math.max(0, value-1)); setResult(null); }} style={{ width:24, height:24, borderRadius:"50%", border:"1px solid rgba(255,107,53,.5)", background:"rgba(255,107,53,.15)", color:"#ff6b35", fontSize:14, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", padding:0, flexShrink:0 }}>−</button>
                <span style={{ fontSize:18, fontWeight:"bold", minWidth:22, textAlign:"center", color:"#fff" }}>{value}</span>
                <button onClick={() => { set(value+1); setResult(null); }} style={{ width:24, height:24, borderRadius:"50%", border:"1px solid rgba(255,107,53,.5)", background:"rgba(255,107,53,.15)", color:"#ff6b35", fontSize:14, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", padding:0, flexShrink:0 }}>＋</button>
              </div>
              <div style={{ fontSize:10, color:"#888" }}>人</div>
            </div>
          ))}
        </div>
        <div style={{ background:"rgba(255,107,53,.1)", borderRadius:8, padding:"8px 16px", fontSize:14, color:"#ffb89a", marginBottom:24 }}>
          合計 <strong style={{ color:"#fff", fontSize:18 }}>{totalPeople}</strong> 人
        </div>

        <SecTitle>💰 予算（肉代のみ）</SecTitle>

        {/* 一人当たり */}
        <div style={{ marginBottom:14 }}>
          <div style={{ fontSize:11, color:"#ffb89a", marginBottom:8 }}>一人当たり</div>
          <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:8 }}>
            {[500,1000,1500,2000,3000].map(v => (
              <button key={v} onClick={() => { setPerPerson(v); setBudget(v * totalPeople); setResult(null); }} style={{
                padding:"5px 12px", borderRadius:16, cursor:"pointer", fontSize:12,
                border:perPerson===v?"2px solid #ff6b35":"1px solid rgba(255,255,255,.2)",
                background:perPerson===v?"rgba(255,107,53,.3)":"rgba(255,255,255,.05)",
                color:perPerson===v?"#ff6b35":"#ccc", fontWeight:perPerson===v?"bold":"normal",
              }}>¥{v.toLocaleString()}</button>
            ))}
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <span style={{ color:"#ffb89a" }}>¥</span>
            <input type="number" value={perPerson} onChange={e => {
              const v = Number(e.target.value);
              setPerPerson(v); setBudget(v * totalPeople); setResult(null);
            }} step={100}
              style={{ background:"rgba(255,255,255,.08)", border:"1px solid rgba(255,107,53,.4)", borderRadius:8, color:"#fff", fontSize:16, padding:"8px 12px", width:110, fontFamily:"monospace" }} />
            <span style={{ fontSize:12, color:"#888" }}>円 / 人</span>
          </div>
        </div>

        {/* 区切り */}
        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:14 }}>
          <div style={{ flex:1, height:1, background:"rgba(255,255,255,.1)" }} />
          <span style={{ fontSize:11, color:"#555" }}>↕ 連動</span>
          <div style={{ flex:1, height:1, background:"rgba(255,255,255,.1)" }} />
        </div>

        {/* 合計 */}
        <div>
          <div style={{ fontSize:11, color:"#ffb89a", marginBottom:8 }}>合計予算</div>
          <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:8 }}>
            {[10000,20000,30000,50000,80000].map(v => (
              <button key={v} onClick={() => {
                setBudget(v);
                setPerPerson(totalPeople > 0 ? Math.round(v / totalPeople) : perPerson);
                setResult(null);
              }} style={{
                padding:"5px 12px", borderRadius:16, cursor:"pointer", fontSize:12,
                border:budget===v?"2px solid #ff6b35":"1px solid rgba(255,255,255,.2)",
                background:budget===v?"rgba(255,107,53,.3)":"rgba(255,255,255,.05)",
                color:budget===v?"#ff6b35":"#ccc", fontWeight:budget===v?"bold":"normal",
              }}>¥{v.toLocaleString()}</button>
            ))}
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <span style={{ color:"#ffb89a" }}>¥</span>
            <input type="number" value={budget} onChange={e => {
              const v = Number(e.target.value);
              setBudget(v);
              setPerPerson(totalPeople > 0 ? Math.round(v / totalPeople) : perPerson);
              setResult(null);
            }} step={1000}
              style={{ background:"rgba(255,255,255,.08)", border:"1px solid rgba(255,107,53,.4)", borderRadius:8, color:"#fff", fontSize:16, padding:"8px 12px", width:130, fontFamily:"monospace" }} />
            <span style={{ fontSize:12, color:"#888" }}>円（合計）</span>
          </div>
        </div>

      </Card>

      {/* ── お客様リクエスト ── */}
      <div style={{ marginBottom:20 }}>
        {/* アコーディオンヘッダー */}
        <button onClick={() => setReqOpen(o => !o)} style={{
          width:"100%", display:"flex", justifyContent:"space-between", alignItems:"center",
          padding:"14px 18px", borderRadius: reqOpen ? "12px 12px 0 0" : 12,
          background:"rgba(255,255,255,.05)", border:"1px solid rgba(255,200,100,.3)",
          color:"#ffd580", cursor:"pointer", fontSize:14, fontWeight:"bold",
        }}>
          <span>🙋 お客様リクエスト {reqCount > 0 && <span style={{ background:"#ff6b35", color:"#fff", borderRadius:10, padding:"1px 8px", fontSize:12, marginLeft:6 }}>{reqCount}品</span>}</span>
          <span style={{ fontSize:18, transform: reqOpen?"rotate(180deg)":"none", transition:"transform .2s" }}>▾</span>
        </button>

        {reqOpen && (
          <div style={{ background:"rgba(255,255,255,.03)", border:"1px solid rgba(255,200,100,.2)", borderTop:"none", borderRadius:"0 0 12px 12px", padding:16 }}>
            <div style={{ fontSize:12, color:"#aaa", marginBottom:12 }}>お客様から希望のあった商品にチェックを入れてください。買い出しリストに別セクションで追加されます。</div>

            {/* カテゴリフィルター */}
            <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:14 }}>
              {[["all","すべて"], ...CATEGORIES.map(c => [c, CATEGORY_LABELS[c]])].map(([key, label]) => (
                <button key={key} onClick={() => setReqFilter(key)} style={{
                  padding:"4px 12px", borderRadius:16, cursor:"pointer", fontSize:11,
                  border:reqFilter===key?"2px solid #ffd580":"1px solid rgba(255,255,255,.15)",
                  background:reqFilter===key?"rgba(255,213,128,.2)":"rgba(255,255,255,.04)",
                  color:reqFilter===key?"#ffd580":"#999",
                }}>{label}</button>
              ))}
            </div>

            {/* 商品チェックリスト */}
            <div style={{ maxHeight:300, overflowY:"auto" }}>
              {reqFiltered.map(item => {
                const checked = requestIds.has(item.id);
                return (
                  <div key={item.id} onClick={() => toggleRequest(item.id)} style={{
                    display:"flex", alignItems:"center", gap:12, padding:"10px 12px", borderRadius:8, marginBottom:6, cursor:"pointer",
                    background: checked ? "rgba(255,213,128,.12)" : "rgba(255,255,255,.03)",
                    border: checked ? "1px solid rgba(255,213,128,.4)" : "1px solid rgba(255,255,255,.07)",
                    transition:"all .15s",
                  }}>
                    {/* チェックボックス風 */}
                    <div style={{
                      width:22, height:22, borderRadius:6, flexShrink:0,
                      border: checked ? "2px solid #ffd580" : "2px solid rgba(255,255,255,.3)",
                      background: checked ? "#ffd580" : "transparent",
                      display:"flex", alignItems:"center", justifyContent:"center",
                      color:"#1a0a00", fontSize:14, fontWeight:"bold",
                    }}>{checked ? "✓" : ""}</div>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:13, color: checked ? "#fff" : "#ccc", fontWeight: checked ? "bold" : "normal" }}>{item.name}</div>
                      <div style={{ fontSize:11, color:"#777", marginTop:2 }}>{item.note} · ¥{Math.round(item.pricePerHg*(item.priceBaseG||100)/100)}/{item.priceBaseG||100}g</div>
                    </div>
                    <div style={{ fontSize:11, color:"#888", whiteSpace:"nowrap" }}>{CATEGORY_LABELS[item.category]}</div>
                  </div>
                );
              })}
            </div>

            {reqCount > 0 && (
              <div style={{ marginTop:12, textAlign:"right" }}>
                <button onClick={() => { setRequestIds(new Set()); setResult(null); }} style={{
                  padding:"4px 12px", background:"rgba(255,0,0,.1)", border:"1px solid rgba(255,0,0,.3)",
                  borderRadius:8, color:"#ff9999", fontSize:12, cursor:"pointer",
                }}>✕ リクエストをすべて解除</button>
              </div>
            )}
          </div>
        )}
      </div>

      {/* 計算ボタン */}
      <button onClick={calculate} style={{
        width:"100%", padding:"18px", background:"linear-gradient(90deg,#c0392b,#e74c3c)", border:"none",
        borderRadius:12, color:"#fff", fontSize:18, fontWeight:"bold", cursor:"pointer", letterSpacing:2,
        boxShadow:"0 4px 20px rgba(192,57,43,.5)", marginBottom:28,
      }}>🥩 買い出しリストを作る</button>

      {/* 結果 */}
      {result && <>
        {/* サマリー */}
        <div style={{ background:"linear-gradient(135deg,rgba(192,57,43,.2),rgba(255,107,53,.1))", border:"1px solid rgba(255,107,53,.5)", borderRadius:16, padding:20, marginBottom:20 }}>
          <div style={{ fontSize:14, color:"#ff6b35", fontWeight:"bold", marginBottom:12 }}>📊 計算結果サマリー</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12, marginBottom:8 }}>
            {[
              { label:"合計人数",  value:`${result.totalPeople}人` },
              { label:"自動チョイス肉量", value:result.autoGrams>=1000?`${(result.autoGrams/1000).toFixed(1)}kg`:`${result.autoGrams}g` },
              { label:"合計金額",  value:`¥${(result.autoCost+result.reqCost).toLocaleString()}` },
            ].map(({ label, value }) => (
              <div key={label} style={{ textAlign:"center" }}>
                <div style={{ fontSize:10, color:"#888", marginBottom:4 }}>{label}</div>
                <div style={{ fontSize:18, fontWeight:"bold", color:"#fff" }}>{value}</div>
              </div>
            ))}
          </div>
          {result.budgetOver && <div style={{ padding:"8px 12px", background:"rgba(255,0,0,.15)", borderRadius:8, color:"#ff9999", fontSize:12 }}>⚠️ 予算を超えています。部位の見直しをご検討ください。</div>}

        </div>

        {/* 自動チョイスセクション */}

        {result.requestedItems.length > 0 && <>
          <div style={{ fontSize:13, color:"#ffd580", fontWeight:"bold", margin:"18px 0 10px", paddingLeft:4 }}>🙋 お客様リクエスト</div>
          {CATEGORIES.map(cat => {
            const items = result.requestedItems.filter(x => x.category === cat);
            if (!items.length) return null;
            return (
              <div key={cat} style={{ background:"rgba(255,213,128,.06)", border:"1px solid rgba(255,213,128,.25)", borderRadius:12, padding:16, marginBottom:10 }}>
                <div style={{ fontSize:13, fontWeight:"bold", color:"#ffd580", marginBottom:10, opacity:0.8 }}>{CATEGORY_LABELS[cat]}</div>
                {items.map(item => <ItemRow key={item.id} item={item} accent="#ffd580" />)}
              </div>
            );
          })}
          <div style={{ background:"rgba(255,213,128,.06)", border:"1px solid rgba(255,213,128,.25)", borderRadius:12, padding:"10px 16px", marginBottom:10, display:"flex", justifyContent:"space-between", fontSize:12, color:"#ffd580" }}>
            <span>リクエスト小計</span>
            <span style={{ fontWeight:"bold" }}>¥{result.reqCost.toLocaleString()}</span>
          </div>
        </>}

        {/* 合計 */}
        <div style={{ background:"rgba(255,107,53,.15)", border:"2px solid #ff6b35", borderRadius:12, padding:16, marginTop:8 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <div>
              <div style={{ fontSize:12, color:"#ffb89a" }}>買い出し合計</div>
              <div style={{ fontSize:11, color:"#888", marginTop:2 }}>
                自動{Object.values(result.selections).flat().length}品
                {result.requestedItems.length > 0 && ` ＋ リクエスト${result.requestedItems.length}品`}
              </div>
            </div>
            <div style={{ fontSize:28, fontWeight:"bold", color:"#fff" }}>¥{(result.autoCost+result.reqCost).toLocaleString()}</div>
          </div>
          <div style={{ marginTop:10, fontSize:11, color:"#888", textAlign:"center" }}>
            残り予算 ¥{(budget - result.autoCost - result.reqCost).toLocaleString()} → 野菜・海鮮・飲み物などに
          </div>
        </div>

        {/* 牛豚鶏比率 */}
        <div style={{ background:"rgba(255,255,255,.04)", border:"1px solid rgba(255,255,255,.1)", borderRadius:12, padding:16, marginTop:12 }}>
          <div style={{ fontSize:13, color:"#ffb89a", fontWeight:"bold", marginBottom:12 }}>🥩 牛・豚・鶏の比率</div>
          {(() => {
            const allItems = [
              ...Object.values(result.selections).flat(),
              ...result.requestedItems,
            ];
            const gBycat = { beef:0, wagyu:0, miyazaki:0, pork:0, chicken:0 };
            allItems.forEach(x => { if (gBycat[x.category] !== undefined) gBycat[x.category] += x.grams; });
            const total = CATEGORIES.reduce((s,c) => s + (gBycat[c]||0), 0) || 1;
            return CATEGORIES.map(cat => {
              const g   = gBycat[cat];
              const pct = Math.round(g / total * 100);
              const colors = { beef:"#e74c3c", pork:"#e67e22", chicken:"#f1c40f" };
              return (
                <div key={cat} style={{ marginBottom:10 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, marginBottom:4 }}>
                    <span style={{ color:"#ccc" }}>{CATEGORY_LABELS[cat]}</span>
                    <span style={{ color:"#fff", fontWeight:"bold" }}>{g >= 1000 ? `${(g/1000).toFixed(1)}kg` : `${g}g`}　{pct}%</span>
                  </div>
                  <div style={{ height:8, background:"rgba(255,255,255,.08)", borderRadius:4, overflow:"hidden" }}>
                    <div style={{ height:"100%", width:`${pct}%`, background:colors[cat], borderRadius:4, transition:"width .4s" }} />
                  </div>
                </div>
              );
            });
          })()}
        </div>
      </>}

      <div style={{ height:40 }} />
      <div style={{ textAlign:"center", fontSize:10, color:"#444" }}>※価格・商品は変更になる場合があります / スタッフ用</div>
    </div>
  );
}

          📦 {item.packs.jumbos > 0
            ? `ジャンボ(${item.packs.jumboG}g)×${item.packs.jumbos}${item.packs.normals>0?` ＋ 通常(${item.packs.packG}g)×${item.packs.normals}`:""}`

  );
}


// ── スタイル編集ページ ──────────────────────────────────────
function StyleEditPage({ products, styleItems, setStyleItems }) {
  const [activeStyle, setActiveStyle] = useState("standard");
  const [filterCat,   setFilterCat]   = useState("all");
  const [saved,       setSaved]       = useState(false);

  const currentIds = styleItems[activeStyle] || [];
  const filtered   = filterCat === "all" ? products : products.filter(p => p.category === filterCat);

  const toggleItem = (id) => {
    setStyleItems(prev => {
      const cur = prev[activeStyle] || [];
      const next = cur.includes(id) ? cur.filter(x => x !== id) : [...cur, id];
      return { ...prev, [activeStyle]: next };
    });
    setSaved(false);
  };

  const clearAll = () => {
    setStyleItems(prev => ({ ...prev, [activeStyle]: [] }));
    setSaved(false);
  };

  return (
    <div style={{ maxWidth:640, margin:"0 auto", padding:"24px 16px" }}>
      <div style={{ fontSize:16, fontWeight:"bold", color:"#ff6b35", marginBottom:6 }}>📋 スタイル別商品設定</div>
      <div style={{ fontSize:12, color:"#888", marginBottom:20 }}>各スタイルに固定する商品をチェックしてください。未設定の場合は自動チョイスになります。</div>

      {/* スタイル選択タブ */}
      <div style={{ display:"flex", flexDirection:"column", gap:6, marginBottom:20 }}>
        {Object.entries(STYLES).map(([key, s]) => {
          const count = (styleItems[key]||[]).length;
          return (
            <div key={key} onClick={() => setActiveStyle(key)} style={{
              padding:"10px 14px", borderRadius:10, cursor:"pointer",
              border: activeStyle===key ? "2px solid #ff6b35" : "1px solid rgba(255,255,255,.1)",
              background: activeStyle===key ? "rgba(255,107,53,.15)" : "rgba(255,255,255,.03)",
              display:"flex", justifyContent:"space-between", alignItems:"center",
            }}>
              <div>
                <div style={{ fontSize:13, fontWeight:"bold", color: activeStyle===key ? "#fff" : "#ccc" }}>{s.label}</div>
              </div>
              <div style={{ fontSize:11, color: count > 0 ? "#ff6b35" : "#555" }}>
                {count > 0 ? `${count}品 固定済み` : "自動チョイス"}
              </div>
            </div>
          );
        })}
      </div>

      {/* カテゴリフィルター */}
      <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:14 }}>
        {[["all","すべて"], ...CATEGORIES.map(c => [c, CATEGORY_LABELS[c]])].map(([key, label]) => (
          <button key={key} onClick={() => setFilterCat(key)} style={{
            padding:"4px 12px", borderRadius:16, cursor:"pointer", fontSize:11,
            border: filterCat===key ? "2px solid #ff6b35" : "1px solid rgba(255,255,255,.15)",
            background: filterCat===key ? "rgba(255,107,53,.25)" : "rgba(255,255,255,.04)",
            color: filterCat===key ? "#ff6b35" : "#999",
          }}>{label}</button>
        ))}
      </div>

      {/* 選択中の件数と全解除 */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
        <div style={{ fontSize:12, color:"#ffb89a" }}>
          {currentIds.length > 0 ? `${currentIds.length}品 選択中` : "未選択（自動チョイス）"}
        </div>
        {currentIds.length > 0 && (
          <button onClick={clearAll} style={{ padding:"4px 12px", background:"rgba(255,0,0,.1)", border:"1px solid rgba(255,0,0,.3)", borderRadius:8, color:"#ff8888", fontSize:11, cursor:"pointer" }}>
            ✕ すべて解除
          </button>
        )}
      </div>

      {/* 商品チェックリスト */}
      <div>
        {filtered.map(item => {
          const checked = currentIds.includes(item.id);
          return (
            <div key={item.id} onClick={() => toggleItem(item.id)} style={{
              display:"flex", alignItems:"center", gap:12, padding:"10px 12px",
              borderRadius:8, marginBottom:6, cursor:"pointer",
              background: checked ? "rgba(255,107,53,.12)" : "rgba(255,255,255,.03)",
              border: checked ? "1px solid rgba(255,107,53,.4)" : "1px solid rgba(255,255,255,.07)",
              transition:"all .15s",
            }}>
              <div style={{
                width:22, height:22, borderRadius:6, flexShrink:0,
                border: checked ? "2px solid #ff6b35" : "2px solid rgba(255,255,255,.3)",
                background: checked ? "#ff6b35" : "transparent",
                display:"flex", alignItems:"center", justifyContent:"center",
                color:"#fff", fontSize:13, fontWeight:"bold",
              }}>{checked ? "✓" : ""}</div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:13, color: checked ? "#fff" : "#ccc", fontWeight: checked?"bold":"normal" }}>{item.name}</div>
                <div style={{ fontSize:11, color:"#666", marginTop:2 }}>{CATEGORY_LABELS[item.category]} · ¥{Math.round(item.pricePerHg*(item.priceBaseG||100)/100)}/{item.priceBaseG||100}g</div>
              </div>
            </div>
          );
        })}
      </div>

      <div style={{ height:40 }} />
      <div style={{ textAlign:"center", fontSize:10, color:"#444" }}>設定はこのセッション中のみ有効です</div>
    </div>
  );
}

// ── 商品編集ページ ──────────────────────────────────────────
function EditPage({ products, setProducts }) {
  const [filterCat, setFilterCat] = useState("all");
  const [editingId, setEditingId] = useState(null);
  const [editBuf,   setEditBuf]   = useState({});
  const [saved,     setSaved]     = useState(false);
  const [addingNew, setAddingNew] = useState(false);
  const emptyNew = { name:"", category:"beef", note:"", priceDisplay:"", priceBaseG:100, bbqRating:4, packGrams:200, jumboGrams:"" };
  const [newBuf,    setNewBuf]    = useState(emptyNew);

  const filtered = filterCat === "all" ? products : products.filter(p => p.category === filterCat);

  const startEdit = (item) => {
    setEditingId(item.id);
    setAddingNew(false);
    const baseG = item.priceBaseG || 100;
    setEditBuf({ name:item.name, note:item.note, priceDisplay:Math.round(item.pricePerHg * baseG / 100), priceBaseG:baseG, bbqRating:item.bbqRating });
    setSaved(false);
  };
  const commitEdit = (id) => {
    const baseG = Number(editBuf.priceBaseG) || 100;
    const newPricePerHg = Math.round(Number(editBuf.priceDisplay) / baseG * 100);
    setProducts(prev => prev.map(p => p.id===id ? { ...p, name:editBuf.name, note:editBuf.note, pricePerHg:newPricePerHg, priceBaseG:baseG, bbqRating:Number(editBuf.bbqRating) } : p));
    setEditingId(null);
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };
  const commitAdd = () => {
    if (!newBuf.name.trim() || !newBuf.priceDisplay) return;
    const baseG = Number(newBuf.priceBaseG) || 100;
    const newId = Math.max(...products.map(p => p.id)) + 1;
    setProducts(prev => [...prev, {
      id: newId,
      category: newBuf.category,
      name: newBuf.name.trim(),
      note: newBuf.note.trim(),
      pricePerHg: Math.round(Number(newBuf.priceDisplay) / baseG * 100),
      priceBaseG: baseG,
      bbqRating: Number(newBuf.bbqRating),
      packGrams: Number(newBuf.packGrams) || 200,
      jumboGrams: newBuf.jumboGrams ? Number(newBuf.jumboGrams) : null,
    }]);
    setAddingNew(false);
    setNewBuf(emptyNew);
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };
  const deleteProduct = (id) => {
    if (!confirm("この商品を削除しますか？")) return;
    setProducts(prev => prev.filter(p => p.id !== id));
  };

  return (
    <div style={{ maxWidth:640, margin:"0 auto", padding:"24px 16px" }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:20 }}>
        <div style={{ fontSize:16, fontWeight:"bold", color:"#ff6b35" }}>⚙️ 商品マスター編集</div>
        <div style={{ display:"flex", gap:8, alignItems:"center" }}>
          {saved && <div style={{ fontSize:12, color:"#7fff7f", background:"rgba(0,200,0,.15)", padding:"4px 12px", borderRadius:20 }}>✓ 保存しました</div>}
          <button onClick={() => { setAddingNew(true); setEditingId(null); }} style={{ padding:"8px 14px", background:"linear-gradient(90deg,#c0392b,#e74c3c)", border:"none", borderRadius:20, color:"#fff", fontSize:12, fontWeight:"bold", cursor:"pointer" }}>＋ 新商品追加</button>
        </div>
      </div>

      {addingNew && (
        <div style={{ background:"rgba(255,213,128,.06)", border:"2px solid rgba(255,213,128,.4)", borderRadius:12, padding:16, marginBottom:20 }}>
          <div style={{ fontSize:13, color:"#ffd580", fontWeight:"bold", marginBottom:14 }}>＋ 新商品を追加</div>
          <ProductForm buf={newBuf} setBuf={setNewBuf} onSave={commitAdd} onCancel={() => setAddingNew(false)} saveLabel="✓ 追加する" />
        </div>
      )}
      <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:20 }}>
        {[["all","すべて"], ...CATEGORIES.map(c => [c, CATEGORY_LABELS[c]])].map(([key, label]) => (
          <button key={key} onClick={() => setFilterCat(key)} style={{
            padding:"6px 14px", borderRadius:20, cursor:"pointer", fontSize:12,
            border:filterCat===key?"2px solid #ff6b35":"1px solid rgba(255,255,255,.2)",
            background:filterCat===key?"rgba(255,107,53,.3)":"rgba(255,255,255,.05)",
            color:filterCat===key?"#ff6b35":"#ccc", fontWeight:filterCat===key?"bold":"normal",
          }}>{label}</button>
        ))}
      </div>

      {filtered.map(item => {
        const isEditing = editingId === item.id;
        return (
          <div key={item.id} style={{
            background:isEditing?"rgba(255,107,53,.08)":"rgba(255,255,255,.03)",
            border:isEditing?"1px solid rgba(255,107,53,.5)":"1px solid rgba(255,255,255,.08)",
            borderRadius:12, padding:16, marginBottom:10, transition:"all .2s",
          }}>
            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:isEditing?14:6 }}>
              <span style={{ fontSize:10, background:"rgba(255,107,53,.2)", color:"#ffb89a", padding:"2px 8px", borderRadius:10 }}>{CATEGORY_LABELS[item.category]}</span>
              <span style={{ fontSize:14, color:"#fff", fontWeight:"bold" }}>{item.name}</span>
            </div>
            {isEditing ? (
              <ProductForm
                buf={editBuf} setBuf={setEditBuf}
                onSave={() => commitEdit(item.id)}
                onCancel={() => setEditingId(null)}
                saveLabel="✓ 保存"
              />
            ) : (
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:12, color:"#888" }}>{item.note || "（コメントなし）"}</div>
                  <div style={{ fontSize:11, color:"#666", marginTop:3 }}>¥{Math.round(item.pricePerHg*(item.priceBaseG||100)/100)}/{item.priceBaseG||100}g　{"★".repeat(item.bbqRating)}{"☆".repeat(5-item.bbqRating)}</div>
                </div>
                <div style={{ display:"flex", gap:6, marginLeft:8 }}>
                  <button onClick={() => startEdit(item)} style={{ padding:"6px 12px", background:"rgba(255,107,53,.15)", border:"1px solid rgba(255,107,53,.3)", borderRadius:8, color:"#ff6b35", fontSize:12, cursor:"pointer", whiteSpace:"nowrap" }}>✏️ 編集</button>
                  <button onClick={() => deleteProduct(item.id)} style={{ padding:"6px 10px", background:"rgba(255,0,0,.1)", border:"1px solid rgba(255,0,0,.3)", borderRadius:8, color:"#ff8888", fontSize:12, cursor:"pointer" }}>🗑️</button>
                </div>
              </div>
            )}
          </div>
        );
      })}
      <div style={{ height:40 }} />
      <div style={{ textAlign:"center", fontSize:10, color:"#444" }}>編集内容はこのセッション中のみ有効です</div>
    </div>
  );
}

// ── 共通UIパーツ ────────────────────────────────────────────
function Card({ children }) {
  return <div style={{ background:"rgba(255,255,255,.05)", border:"1px solid rgba(255,107,53,.3)", borderRadius:16, padding:24, marginBottom:20 }}>{children}</div>;
}
function SecTitle({ children }) {
  return <div style={{ fontSize:15, fontWeight:"bold", color:"#ff6b35", marginBottom:14, borderBottom:"1px solid rgba(255,107,53,.3)", paddingBottom:8 }}>{children}</div>;
}
function RoundBtn({ onClick, children, small }) {
  const size = small ? 26 : 32;
  return (
    <button onClick={onClick} style={{ width:size, height:size, borderRadius:"50%", border:"1px solid rgba(255,107,53,.5)", background:"rgba(255,107,53,.15)", color:"#ff6b35", fontSize:small?14:18, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", lineHeight:1, padding:0, flexShrink:0 }}>{children}</button>
  );
}
function Toggle({ on }) {
  return (
    <div style={{ width:44, height:24, borderRadius:12, background:on?"#ff6b35":"rgba(255,255,255,.2)", position:"relative", transition:"background .2s", flexShrink:0 }}>
      <div style={{ position:"absolute", top:3, left:on?23:3, width:18, height:18, borderRadius:"50%", background:"#fff", transition:"left .2s" }} />
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
